<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Doctor Profile</title>

<link rel="stylesheet" href="../css/doctor-profile.css">
</head>

<body>

<div class="container">

    <div class="card">

        <h1>Update Profile</h1>

        <form id="profileForm">

            <input
            type="text"
            id="name"
            placeholder="Name"
            required>

            <input
            type="email"
            id="email"
            placeholder="Email"
            required>

            <input
            type="text"
            id="phone"
            placeholder="Phone"
            required>

            <input
            type="text"
            id="specialization"
            placeholder="Specialization"
            required>

            <input
            type="password"
            id="password"
            placeholder="Password">

            <button type="submit">

                Update Profile

            </button>

        </form>

        <button
        class="back-btn"
        onclick="window.location.href='doctor-dashboard.html'">

            Back

        </button>

    </div>

</div>

<script src="../js/doctor-profile.js"></script>

</body>
</html>

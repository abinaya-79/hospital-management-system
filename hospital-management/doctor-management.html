<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Doctor Management</title>

<link rel="stylesheet"
href="../css/doctor-management.css">

</head>

<body>

<div class="container">

    <!-- Sidebar -->

    <aside class="sidebar">

        <h2>CARECONNECT</h2>

        <ul>

            <li onclick="window.location.href='admin-dashboard.html'">
                Dashboard
            </li>

            <li class="active">
                Doctors
            </li>

            <li onclick="window.location.href='patient-management.html'">
                Patients
            </li>

            <li onclick="window.location.href='admin-appointments.html'">
                Appointments
            </li>

            <li id="logoutBtn">
                Logout
            </li>

        </ul>

    </aside>

    <!-- Main -->

    <main class="main-content">

        <div class="top-bar">

            <div>

                <h1>Doctor Management</h1>

                <p>
                    Manage all registered doctors.
                </p>

            </div>

            <button
            id="addDoctorBtn">

                + Add Doctor

            </button>

        </div>

        <div class="table-card">

            <table>

                <thead>

                    <tr>

                        <th>Name</th>

                        <th>Specialization</th>

                        <th>Email</th>

                        <th>Phone</th>

                        <th>Availability</th>

                        <th>Actions</th>

                    </tr>

                </thead>

                <tbody
                id="doctorTable">

                </tbody>

            </table>

        </div>

    </main>

</div>

<script src="../js/doctor-management.js"></script>

</body>

</html>

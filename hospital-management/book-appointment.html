<!DOCTYPE html>

<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Book Appointment | CareConnect</title>

<link rel="stylesheet" href="../css/bookappointment.css">

</head>

<body>

<div class="container">


<div class="card">

    <h1>📅 Book Appointment</h1>

    <form id="appointmentForm">

        <input
            type="text"
            id="patientName"
            placeholder="Patient Name"
            required
        >

        <select
            id="doctorSelect"
            required
        >

            <option value="">
                Select Doctor
            </option>

        </select>

        <input
            type="date"
            id="appointmentDate"
            required
        >

        <input
            type="time"
            id="appointmentTime"
            required
        >

        <textarea
            id="reason"
            placeholder="Reason for Visit"
            rows="4"
            required
        ></textarea>

        <button type="submit">

            Book Appointment

        </button>

    </form>

    <button
        class="back-btn"
        onclick="window.location.href='patient-dashboard.html'">

        ← Back

    </button>

</div>


</div>

<script src="../js/bookAppointment.js"></script>

</body>

</html>

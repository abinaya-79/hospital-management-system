<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CareConnect - Patient Dashboard</title>

    <link rel="stylesheet" href="../css/patient-dashboard.css">
</head>
<body>

<div class="container">

    <!-- Sidebar -->

    <aside class="sidebar">

        <h2>CARECONNECT</h2>

        <ul>

            <li class="active">
                Dashboard
            </li>

            <li onclick="window.location.href='book-appointment.html'">
                Book Appointment
            </li>

            <li onclick="window.location.href='view-doctors.html'">
                Doctors
            </li>

            <li onclick="window.location.href='my-appointments.html'">
                My Appointments
            </li>

            <li onclick="window.location.href='patient-prescriptions.html'">
                Prescriptions
            </li>

            <li onclick="window.location.href='patient-medical-history.html'">
                Medical History
            </li>

            <li onclick="window.location.href='patient-profile.html'">
                Profile
            </li>

            <li id="logoutBtn">
                Logout
            </li>

        </ul>

    </aside>

    <!-- Main Content -->

    <main class="main-content">

        <div class="welcome-section">

            <h1 id="patientWelcome">
                Welcome 👋
            </h1>

            <p>
                Manage your healthcare services using the sidebar.
            </p>

        </div>

        <div class="message-card">

            <h2>
                💙 Patient Corner
            </h2>

            <p id="dailyMessage"></p>

        </div>

    </main>

</div>

<script src="../js/patient-dashboard.js"></script>

</body>
</html>

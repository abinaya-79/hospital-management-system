<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CareConnect Login</title>
    <link rel="stylesheet" href="../css/auth.css">
</head>
<body>

    <div class="login-container">

        <div class="login-card">

            <h1 class="logo">CARECONNECT</h1>
            <p class="subtitle">Hospital Management System</p>

            <!-- Role Tabs -->
            <div class="role-tabs">
                <button class="role-btn active" onclick="selectRole('patient', this)">
                    Patient
                </button>

                <button class="role-btn" onclick="selectRole('doctor', this)">
                    Doctor
                </button>

                <button class="role-btn" onclick="selectRole('admin', this)">
                    Admin
                </button>
            </div>

            <form id="loginForm">

                <input
    type="email"
    id="email"
    placeholder="Enter Email"
    required
>

                <div class="password-box">
                    <input
                        type="password"
                        id="password"
                        placeholder="Enter Password"
                        required
                    >

                    <span onclick="togglePassword()">👁</span>
                </div>

                <button type="submit" class="login-btn">
                    Login
                </button>

            </form>

            <p class="forgot">
                Forgot Password?
            </p>

            <p id="registerText">
                Don't have an account?
                <a href="register.html">Register</a>
            </p>

        </div>

    </div>

    <script src="../js/auth.js"></script>

</body>
</html>

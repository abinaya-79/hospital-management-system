<!DOCTYPE html>

<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Edit Patient | CareConnect</title>

<link rel="stylesheet" href="../css/editpatient.css">

</head>

<body>

<div class="container">

```
<div class="card">

    <h1>✏️ Edit Patient</h1>

    <form id="editPatientForm">

        <input
            type="text"
            id="name"
            placeholder="Patient Name"
            required
        >

        <input
            type="email"
            id="email"
            placeholder="Email"
            required
        >

        <input
            type="text"
            id="phone"
            placeholder="Phone Number"
            required
        >

        <input
            type="number"
            id="age"
            placeholder="Age"
            required
        >

        <select
            id="gender"
            required
        >

            <option value="">
                Select Gender
            </option>

            <option value="Male">
                Male
            </option>

            <option value="Female">
                Female
            </option>

            <option value="Other">
                Other
            </option>

        </select>

        <button type="submit">

            Update Patient

        </button>

    </form>

    <button
        class="back-btn"
        onclick="window.location.href='view-patients.html'">

        ← Back

    </button>

</div>
```

</div>

<script src="../js/editPatient.js"></script>

</body>

</html>

<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>CareConnect - Admin Dashboard</title>

    <link rel="stylesheet" href="../css/admin-dashboard.css">

</head>

<body>

<div class="container">

    <!-- Sidebar -->

    <aside class="sidebar">

        <h2>CARECONNECT</h2>

        <ul>

            <li class="active">
                Dashboard
            </li>

            <li onclick="window.location.href='doctor-management.html'">
                Doctors
            </li>

            <li onclick="window.location.href='patient-management.html'">
                Patients
            </li>

            <li onclick="window.location.href='admin-appointments.html'">
                Appointments
            </li>

            <li id="logoutBtn">
                Logout
            </li>

        </ul>

    </aside>

    <!-- Main Content -->

    <main class="main-content">

        <!-- Welcome Card -->

        <div class="welcome-card">

            <h1 id="adminWelcome">
                Welcome Admin 👋
            </h1>

            <p>
                Manage doctors, patients and appointments efficiently from one place.
            </p>

        </div>

        <!-- Statistics -->

        <div class="cards">

            <div class="card">

                <h3>Total Doctors</h3>

                <h2 id="doctorCount">
                    0
                </h2>

            </div>

            <div class="card">

                <h3>Total Patients</h3>

                <h2 id="patientCount">
                    0
                </h2>

            </div>

            <div class="card">

                <h3>Total Appointments</h3>

                <h2 id="appointmentCount">
                    0
                </h2>

            </div>

            <div class="card">

                <h3>Pending Appointments</h3>

                <h2 id="pendingCount">
                    0
                </h2>

            </div>

        </div>

        <!-- Admin Message -->

        <div class="message-card">

            <h2>🏥 Admin Message</h2>

            <p id="adminMessage">
                Loading...
            </p>

        </div>

    </main>

</div>

<script src="../js/admin-dashboard.js"></script>

</body>

</html>
